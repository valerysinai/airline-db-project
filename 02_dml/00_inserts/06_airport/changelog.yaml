databaseChangeLog:
  - changeSet:
      id: dml-31-insert-airports
      author: valerysinai
      changes:
        - sql:
            sql: |
              INSERT INTO airport (address_id, airport_name, iata_code, icao_code, is_active) VALUES
              ((SELECT address_id FROM address WHERE address_line_1 = 'Calle 5 # 4-30'),   'Aeropuerto Benito Salas', 'NVA', 'SKNV', true),
              ((SELECT address_id FROM address WHERE address_line_1 = 'Carrera 7 # 32-16'),'Aeropuerto El Dorado',    'BOG', 'SKBO', true),
              ((SELECT address_id FROM address WHERE address_line_1 = '1000 NW 42nd Ave'),  'Miami International',     'MIA', 'KMIA', true),
              ((SELECT address_id FROM address WHERE address_line_1 = 'Calle Gran Vía 1'),  'Adolfo Suárez Barajas',   'MAD', 'LEMD', true),
              ((SELECT address_id FROM address WHERE address_line_1 = '1 London Bridge'),   'Heathrow Airport',        'LHR', 'EGLL', true);

  - changeSet:
      id: dml-32-insert-terminals
      author: valerysinai
      changes:
        - sql:
            sql: |
              INSERT INTO terminal (airport_id, terminal_code, terminal_name) VALUES
              ((SELECT airport_id FROM airport WHERE iata_code = 'BOG'), 'T1', 'Terminal Nacional'),
              ((SELECT airport_id FROM airport WHERE iata_code = 'BOG'), 'T2', 'Terminal Internacional'),
              ((SELECT airport_id FROM airport WHERE iata_code = 'MIA'), 'TA', 'Terminal A'),
              ((SELECT airport_id FROM airport WHERE iata_code = 'MAD'), 'T4', 'Terminal 4'),
              ((SELECT airport_id FROM airport WHERE iata_code = 'LHR'), 'T5', 'Terminal 5');

  - changeSet:
      id: dml-33-insert-boarding-gates
      author: valerysinai
      changes:
        - sql:
            sql: |
              INSERT INTO boarding_gate (terminal_id, gate_code, is_active) VALUES
              ((SELECT terminal_id FROM terminal WHERE terminal_code = 'T1' AND airport_id = (SELECT airport_id FROM airport WHERE iata_code = 'BOG')), 'G01', true),
              ((SELECT terminal_id FROM terminal WHERE terminal_code = 'T1' AND airport_id = (SELECT airport_id FROM airport WHERE iata_code = 'BOG')), 'G02', true),
              ((SELECT terminal_id FROM terminal WHERE terminal_code = 'T2' AND airport_id = (SELECT airport_id FROM airport WHERE iata_code = 'BOG')), 'G10', true),
              ((SELECT terminal_id FROM terminal WHERE terminal_code = 'TA' AND airport_id = (SELECT airport_id FROM airport WHERE iata_code = 'MIA')), 'A01', true),
              ((SELECT terminal_id FROM terminal WHERE terminal_code = 'T4' AND airport_id = (SELECT airport_id FROM airport WHERE iata_code = 'MAD')), 'D10', true);

  - changeSet:
      id: dml-34-insert-runways
      author: valerysinai
      changes:
        - sql:
            sql: |
              INSERT INTO runway (airport_id, runway_code, length_meters, surface_type) VALUES
              ((SELECT airport_id FROM airport WHERE iata_code = 'BOG'), 'RWY-13R', 3800, 'ASPHALT'),
              ((SELECT airport_id FROM airport WHERE iata_code = 'BOG'), 'RWY-31L', 3800, 'ASPHALT'),
              ((SELECT airport_id FROM airport WHERE iata_code = 'MIA'), 'RWY-08R', 3962, 'ASPHALT'),
              ((SELECT airport_id FROM airport WHERE iata_code = 'MAD'), 'RWY-18R', 4100, 'CONCRETE'),
              ((SELECT airport_id FROM airport WHERE iata_code = 'LHR'), 'RWY-09L', 3902, 'ASPHALT');