  - changeSet:
      id: 55-create-reservation
      author: valerysinai
      changes:
        - createTable:
            tableName: reservation
            columns:
              - column:
                  name: reservation_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: booked_by_customer_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_reservation_customer
                    references: customer(customer_id)
              - column:
                  name: reservation_status_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_reservation_status
                    references: reservation_status(reservation_status_id)
              - column:
                  name: sale_channel_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_reservation_channel
                    references: sale_channel(sale_channel_id)
              - column:
                  name: reservation_code
                  type: varchar(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: booked_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamptz
              - column:
                  name: notes
                  type: text
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

