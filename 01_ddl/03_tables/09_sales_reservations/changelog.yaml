databaseChangeLog:
  - changeSet:
      id: 52-create-reservation-status
      author: valerysinai
      changes:
        - createTable:
            tableName: reservation_status
            columns:
              - column:
                  name: reservation_status_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: status_code
                  type: varchar(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: status_name
                  type: varchar(80)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 53-create-sale-channel
      author: valerysinai
      changes:
        - createTable:
            tableName: sale_channel
