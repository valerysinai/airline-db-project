databaseChangeLog:
  - changeSet:
      id: 16-create-user-status
      author: valerysinai
      changes:
        - createTable:
            tableName: user_status
            columns:
              - column:
                  name: user_status_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: status_code
                  type: varchar(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: status_name
                  type: varchar(80)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 17-create-security-role
      author: valerysinai
      changes:
        - createTable:
            tableName: security_role
            columns:
              - column:
                  name: security_role_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: role_code
                  type: varchar(30)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: role_name
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: role_description
                  type: text
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 18-create-security-permission
      author: valerysinai
      changes:
        - createTable:
            tableName: security_permission
            columns:
              - column:
                  name: security_permission_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: permission_code
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: permission_name
                  type: varchar(120)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: permission_description
                  type: text
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 19-create-user-account
      author: valerysinai
      changes:
        - createTable:
            tableName: user_account
            columns:
              - column:
                  name: user_account_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: person_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_user_account_person
                    references: person(person_id)
              - column:
                  name: user_status_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_account_status
                    references: user_status(user_status_id)
              - column:
                  name: username
                  type: varchar(80)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_login_at
                  type: timestamptz
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 20-create-user-role
      author: valerysinai
      changes:
        - createTable:
            tableName: user_role
            columns:
              - column:
                  name: user_role_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: user_account_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_role_account
                    references: user_account(user_account_id)
              - column:
                  name: security_role_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_role_role
                    references: security_role(security_role_id)
              - column:
                  name: assigned_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: assigned_by_user_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_user_role_assigned_by
                    references: user_account(user_account_id)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
