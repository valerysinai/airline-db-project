            tableName: role_permission
            columns:
              - column:
                  name: role_permission_id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: security_role_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_role_permission_role
                    references: security_role(security_role_id)
              - column:
                  name: security_permission_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_role_permission_permission
                    references: security_permission(security_permission_id)
              - column:
                  name: granted_at
                  type: timestamptz
                  defaultValueComputed: now()
